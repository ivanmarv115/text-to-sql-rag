name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # The validator / retrieval / mock / embedding modules are intentionally
      # dependency-free, so the unit tests need only pytest. This keeps CI fast
      # and independent of the heavier runtime stack (Chainlit, ChromaDB, torch).
      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Run tests
        run: pytest
